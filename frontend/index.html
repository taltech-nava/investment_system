<!DOCTYPE html>
<html>
<head>
    <title>DB Viewer</title>
</head>
<body>

    <h1>Sources Viewer</h1>

    <input id="ticker" placeholder="Enter ticker (e.g. AAPL)" />
    <button onclick="fetchTicker()">Fetch</button>

    <button onclick="loadDB()">Load DB</button>

    <pre id="output"></pre>

    <script>
        async function fetchTicker() {
            const ticker = document.getElementById("ticker").value;

            const res = await fetch(`http://localhost:8000/fetch/${ticker}`);
            const data = await res.json();

            document.getElementById("output").innerText =
                JSON.stringify(data, null, 2);
        }

        async function loadDB() {
            const res = await fetch(`http://localhost:8000/sources`);
            const data = await res.json();

            document.getElementById("output").innerText =
                JSON.stringify(data, null, 2);
        }
    </script>

</body>
</html>
